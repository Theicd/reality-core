<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reality-Core — API Validator Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#e0e0e0;font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0d1117,#161b22);padding:14px 24px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;color:#00e5ff;text-shadow:0 0 8px rgba(0,229,255,.3)}
.hdr .chips{display:flex;gap:10px;font-size:13px;flex-wrap:wrap}
.chip{padding:3px 10px;border-radius:12px;background:#161b22;border:1px solid #30363d}
.chip.g{border-color:#69f0ae;color:#69f0ae}.chip.r{border-color:#ff5252;color:#ff5252}.chip.y{border-color:#ffab00;color:#ffab00}
.bar{padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #21262d}
btn,button{background:#1a237e;color:#e0e0e0;border:1px solid #3949ab;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
button:hover{background:#283593;border-color:#5c6bc0}
button.pri{background:#00695c;border-color:#00897b}
button.pri:hover{background:#00796b}
.prog{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin:0 24px 6px}
.prog .fill{height:100%;background:linear-gradient(90deg,#00e5ff,#69f0ae);transition:width .4s;width:0}
.main{padding:16px 24px;overflow-y:auto;max-height:calc(100vh - 140px)}
.sum{display:flex;gap:12px;padding:12px;background:#161b22;border-radius:8px;margin-bottom:14px;flex-wrap:wrap}
.sum .it{text-align:center;flex:1;min-width:70px}
.sum .n{font-size:26px;font-weight:700}
.sum .l{font-size:10px;color:#8b949e}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;border:1px solid #30363d;background:#161b22;transition:all .15s}
.cat-btn:hover,.cat-btn.on{border-color:#00e5ff;color:#00e5ff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 12px;transition:border-color .2s}
.card:hover{border-color:#484f58}
.card.ok{border-right:3px solid #69f0ae}
.card.fail{border-right:3px solid #ff5252}
.card.pending{border-right:3px solid #484f58}
.card .top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.card .nm{font-weight:600;font-size:13px;flex:1}
.b{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b.ok{background:#1b5e20;color:#69f0ae}.b.err{background:#b71c1c;color:#ff5252}.b.wait{background:#37474f;color:#90a4ae}
.b.free{background:#004d40;color:#4db6ac}.b.cat{background:#1a237e;color:#7c4dff}
.card .data{background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:6px 8px;font-size:11px;font-family:'Cascadia Code','Fira Code',monospace;color:#8b949e;margin:6px 0 4px;min-height:20px;word-break:break-all}
.card .meta{font-size:10px;color:#6e7681;display:flex;gap:8px;flex-wrap:wrap}
.card .meta span{display:inline-flex;align-items:center;gap:2px}
.empty{text-align:center;padding:60px 20px;color:#484f58}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.tbl th{text-align:right;padding:6px 8px;background:#161b22;border-bottom:2px solid #30363d;color:#8b949e;font-weight:600;position:sticky;top:0}
.tbl td{padding:6px 8px;border-bottom:1px solid #21262d}
.tbl tr:hover td{background:#1c2128}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulsing{animation:pulse 1.2s infinite}
</style>
</head>
<body>

<div class="hdr">
  <h1>🔬 Reality-Core — API Validator</h1>
  <div class="chips" id="chips">
    <span class="chip">טוען...</span>
  </div>
</div>

<div class="bar">
  <button class="pri" onclick="doValidate()">🔬 בדוק את כל ה-APIs</button>
  <button onclick="showAll()">📋 קטלוג מלא</button>
  <button onclick="showOnlyOk()">✅ רק עובדים</button>
  <button onclick="showOnlyFail()">❌ רק נכשלים</button>
</div>
<div class="prog"><div class="fill" id="progBar"></div></div>

<div class="main" id="main">
  <div class="empty" id="emptyMsg">לחץ <b>"בדוק את כל ה-APIs"</b> כדי להתחיל סריקה חכמה</div>
</div>

<script src="api-registry.js"></script>
<script src="api-validator.js"></script>
<script>
let filterMode = 'all';
let filterCat = null;

function updateChips() {
  const s = typeof getApiStats === 'function' ? getApiStats() : null;
  const v = typeof getValidationSummary === 'function' ? getValidationSummary() : null;
  const el = document.getElementById('chips');
  if (!s) { el.innerHTML = '—'; return; }
  let h = `<span class="chip">סה"כ: ${s.total}</span>`;
  h += `<span class="chip g">פעילים: ${s.active}</span>`;
  h += `<span class="chip y">CORS OK: ${Object.values(API_REGISTRY).filter(a=>a.active&&a.cors!==false).length}</span>`;
  if (v) {
    h += `<span class="chip g">✓ ${v.ok}</span>`;
    h += `<span class="chip r">✗ ${v.fail}</span>`;
    h += `<span class="chip">${v.percentage}% | ${v.avgResponseTime}ms avg | ${v.totalDataKB}KB</span>`;
  }
  el.innerHTML = h;
}

function fmtInterval(sec) {
  if (!sec) return '—';
  if (sec < 60) return sec + 'שנ';
  if (sec < 3600) return Math.round(sec/60) + 'דק';
  if (sec < 86400) return Math.round(sec/3600) + 'שע';
  return Math.round(sec/86400) + 'ימים';
}

function renderResults() {
  const results = getValidationResults();
  const keys = Object.keys(results);
  if (!keys.length) return;
  document.getElementById('emptyMsg').style.display = 'none';

  const summary = getValidationSummary();
  let html = '';

  // Summary bar
  const pct = summary.percentage;
  const pColor = pct >= 80 ? '#69f0ae' : pct >= 50 ? '#ffab00' : '#ff5252';
  html += `<div class="sum">
    <div class="it"><div class="n" style="color:${pColor}">${pct}%</div><div class="l">הצלחה</div></div>
    <div class="it"><div class="n" style="color:#69f0ae">${summary.ok}</div><div class="l">✓ עובדים</div></div>
    <div class="it"><div class="n" style="color:#ff5252">${summary.fail}</div><div class="l">✗ נכשלו</div></div>
    <div class="it"><div class="n" style="color:#42a5f5">${summary.avgResponseTime}ms</div><div class="l">זמן ממוצע</div></div>
    <div class="it"><div class="n" style="color:#8b949e">${summary.totalDataKB}KB</div><div class="l">מידע שנמשך</div></div>
  </div>`;

  // Category filter
  html += '<div class="cats">';
  html += `<span class="cat-btn ${!filterCat?'on':''}" onclick="filterCat=null;renderResults()">הכל</span>`;
  for (const c of summary.byCategory) {
    html += `<span class="cat-btn ${filterCat===c.category?'on':''}" onclick="filterCat='${c.category}';renderResults()">${c.label} (${c.ok}/${c.total})</span>`;
  }
  html += '</div>';

  // Cards grid
  let items = Object.values(results);
  if (filterMode === 'ok') items = items.filter(r => r.status === 'ok');
  if (filterMode === 'fail') items = items.filter(r => r.status !== 'ok');
  if (filterCat) items = items.filter(r => r.category === filterCat);
  items.sort((a,b) => (a.status === 'ok' ? 0 : 1) - (b.status === 'ok' ? 0 : 1) || a.name.localeCompare(b.name));

  html += '<div class="grid">';
  for (const r of items) {
    const cls = r.status === 'ok' ? 'ok' : 'fail';
    const catLabel = (typeof API_CATEGORIES !== 'undefined' && API_CATEGORIES[r.category]?.label) || r.category;
    const ri = r.rateInfo;
    html += `<div class="card ${cls}">
      <div class="top">
        <span class="nm">${r.name}</span>
        <span class="b ${cls}">${r.status === 'ok' ? 'OK '+r.httpCode : r.error || r.status}</span>
        <span class="b cat">${catLabel}</span>
      </div>`;
    if (r.status === 'ok') {
      html += `<div class="data">${_esc(r.dataSample || '—')}${r.dataCount != null ? ' <b>('+r.dataCount+' items)</b>' : ''}</div>`;
    } else {
      html += `<div class="data" style="color:#ff5252">${_esc(r.error || 'Unknown error')}</div>`;
    }
    html += `<div class="meta">
        <span>⏱ ${r.responseTime || '—'}ms</span>
        <span>📦 ${r.dataSize ? (r.dataSize/1024).toFixed(1)+'KB' : '—'}</span>
        <span>🔄 כל ${fmtInterval(r.refreshInterval)}</span>`;
    if (ri) html += `<span>📊 ${ri.max}${ri.note ? ' ('+ri.note+')' : ''}</span>`;
    if (r.missingFields?.length) html += `<span style="color:#ff5252">חסר: ${r.missingFields.join(', ')}</span>`;
    html += `</div></div>`;
  }
  html += '</div>';

  // Full table
  html += '<h3 style="margin:20px 0 8px;color:#8b949e;font-size:14px">טבלת סיכום</h3>';
  html += `<table class="tbl"><tr><th>API</th><th>קטגוריה</th><th>סטטוס</th><th>HTTP</th><th>זמן</th><th>גודל</th><th>פריטים</th><th>רענון</th><th>מגבלת קצב</th></tr>`;
  for (const r of items) {
    const ri = r.rateInfo;
    html += `<tr>
      <td>${r.name}</td>
      <td>${r.category}</td>
      <td><span class="b ${r.status==='ok'?'ok':'err'}">${r.status}</span></td>
      <td>${r.httpCode||'—'}</td>
      <td>${r.responseTime||'—'}ms</td>
      <td>${r.dataSize?(r.dataSize/1024).toFixed(1)+'KB':'—'}</td>
      <td>${r.dataCount!=null?r.dataCount:'—'}</td>
      <td>${fmtInterval(r.refreshInterval)}</td>
      <td>${ri?ri.max:'—'}</td>
    </tr>`;
  }
  html += '</table>';

  document.getElementById('main').innerHTML = html;
  updateChips();
}

function _esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function doValidate() {
  filterMode = 'all'; filterCat = null;
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('main').innerHTML = '<div class="empty pulsing">⏳ סורק APIs... 0/0</div>';
  document.getElementById('progBar').style.width = '0%';

  await runFullValidation((done, total, batch) => {
    const pct = Math.round(done/total*100);
    document.getElementById('progBar').style.width = pct + '%';
    document.getElementById('main').innerHTML = `<div class="empty pulsing">⏳ סורק APIs... ${done}/${total} (${pct}%)</div>`;
  });

  document.getElementById('progBar').style.width = '100%';
  renderResults();
}

function showAll() { filterMode = 'all'; renderResults(); }
function showOnlyOk() { filterMode = 'ok'; renderResults(); }
function showOnlyFail() { filterMode = 'fail'; renderResults(); }

// Show registry on load
function showRegistryTable() {
  if (typeof API_REGISTRY === 'undefined') return;
  const apis = Object.entries(API_REGISTRY);
  let active = apis.filter(([,v])=>v.active && v.cors !== false);
  let inactive = apis.filter(([,v])=>!v.active || v.cors === false);

  let html = `<div class="sum">
    <div class="it"><div class="n" style="color:#00e5ff">${apis.length}</div><div class="l">סה"כ</div></div>
    <div class="it"><div class="n" style="color:#69f0ae">${active.length}</div><div class="l">ניתנים לבדיקה (CORS+active)</div></div>
    <div class="it"><div class="n" style="color:#ff5252">${inactive.length}</div><div class="l">לא זמינים מ-browser</div></div>
  </div>`;
  html += '<p style="color:#8b949e;font-size:13px;margin-bottom:12px">רק APIs עם <b>CORS</b> פתוח ו-<b>active=true</b> נבדקים. השאר דורשים proxy/server/מפתח.</p>';
  html += '<div id="emptyMsg" style="display:none"></div>';
  document.getElementById('main').innerHTML = html;
  updateChips();
}
showRegistryTable();
</script>
</body>
</html>
